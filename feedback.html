<!doctype html>
<html lang="pt-BR" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedbacks | Doce Sabor by Dai</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Open+Sans:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "cream-bg": "#FDFBF7",
              "tiffany-blue": "#33A19C",
              "delicate-pink": "#F2A3A6",
              "dark-text": "#362222",
              "golden-sweet": "#FFD700",
              "soft-cream": "#FFF8DC",
              "dark-bg": "#262626",
              "dark-tiffany-blue": "#6AB4B0",
              "dark-text-light": "#E0E0E0",
              "dark-soft-cream": "#3F3F3F",
            },
            fontFamily: {
              "dancing-script": ['"Dancing Script"', "cursive"],
              "open-sans": ['"Open Sans"', "sans-serif"],
            },
            borderRadius: {
              "3xl": "1.5rem",
              "4xl": "2rem",
            },
          },
        },
      };

      if (
        localStorage.getItem("color-theme") === "dark" ||
        (!("color-theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
  </head>

  <body
    class="font-open-sans bg-cream-bg text-dark-text dark:bg-dark-bg dark:text-dark-text-light antialiased transition-colors duration-500 min-h-screen flex flex-col justify-between"
  >
    <header
      class="container mx-auto px-4 py-4 flex items-center justify-between"
    >
      <a href="index.html" class="flex items-center gap-3">
        <img
          src="imagens/novo-logo.jpg.jfif"
          alt="Logo"
          class="w-12 h-12 rounded-xl object-cover border border-delicate-pink/30 shadow-sm"
        />
        <span
          class="text-2xl font-dancing-script font-bold text-tiffany-blue dark:text-dark-tiffany-blue"
          >Doce Sabor by Dai</span
        >
      </a>
      <a
        href="index.html"
        class="bg-tiffany-blue hover:bg-delicate-pink text-white px-4 py-2 rounded-full font-bold text-sm shadow-md transition duration-300"
      >
        ← Voltar para Home
      </a>
    </header>

    <main class="container mx-auto px-4 py-12 max-w-4xl flex-grow">
      <div class="text-center space-y-3 mb-12">
        <h1
          class="text-4xl md:text-5xl font-dancing-script font-bold text-tiffany-blue dark:text-dark-tiffany-blue"
        >
          O carinho dos nossos clientes
        </h1>
      </div>

      <!-- GRADE DE COMENTÁRIOS (ID 'listaComentarios' é onde novos itens vão aparecer) -->
      <div
        id="listaComentarios"
        class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-16"
      >
        <div
          class="bg-white dark:bg-neutral-800 p-6 rounded-3xl shadow-sm border border-delicate-pink/10 space-y-3"
        >
          <div class="flex items-center justify-between">
            <h3 class="font-bold text-dark-text dark:text-white">
              Mariana Silva
            </h3>
            <span class="text-yellow-400 text-sm">⭐⭐⭐⭐⭐</span>
          </div>
          <p
            class="text-xs text-tiffany-blue dark:text-dark-tiffany-blue font-semibold"
          >
            Sabor: Leite
          </p>
          <p
            class="text-sm text-dark-text/80 dark:text-dark-text-light/80 italic"
          >
            "As bolachinhas de leite são simplesmente perfeitas!"
          </p>
        </div>
      </div>

      <div
        class="bg-soft-cream dark:bg-dark-soft-cream rounded-4xl p-8 md:p-12 shadow-sm max-w-2xl mx-auto"
      >
        <h2
          class="text-3xl font-dancing-script text-center text-tiffany-blue dark:text-dark-tiffany-blue mb-6"
        >
          Envie seu Depoimento
        </h2>
        <form
          id="feedbackForm"
          onsubmit="processarFeedback(event)"
          class="space-y-4"
        >
          <input
            type="text"
            id="nome"
            required
            class="w-full px-4 py-2 rounded-2xl border border-delicate-pink/30 bg-white dark:bg-neutral-800"
            placeholder="Seu Nome"
          />
          <input
            type="text"
            id="sabor"
            class="w-full px-4 py-2 rounded-2xl border border-delicate-pink/30 bg-white dark:bg-neutral-800"
            placeholder="Produto/Sabor"
          />
          <select
            id="nota"
            class="w-full px-4 py-2 rounded-2xl border border-delicate-pink/30 bg-white dark:bg-neutral-800"
          >
            <option value="5">⭐⭐⭐⭐⭐ (Excelente)</option>
            <option value="4">⭐⭐⭐⭐ (Muito Bom)</option>
            <option value="3">⭐⭐⭐ (Bom)</option>
          </select>
          <textarea
            id="mensagem"
            rows="4"
            required
            class="w-full px-4 py-2 rounded-2xl border border-delicate-pink/30 bg-white dark:bg-neutral-800"
            placeholder="Sua mensagem..."
          ></textarea>
          <button
            type="submit"
            class="w-full bg-tiffany-blue hover:bg-delicate-pink text-white font-bold py-3 rounded-full transition"
          >
            🚀 Enviar para a Dai
          </button>
        </form>
      </div>
    </main>

    <footer
      class="bg-[#FFF8DC] dark:bg-dark-soft-cream py-6 text-center border-t border-delicate-pink/20 transition-colors duration-500"
    >
      <p class="text-xs text-dark-text/70 dark:text-dark-text-light/70">
        &copy; 2026 Doce Sabor by Dai. Todos os direitos reservados.
      </p>
    </footer>

    <script>
      function processarFeedback(event) {
        event.preventDefault();

        // Pega os dados
        const nome = document.getElementById("nome").value;
        const sabor = document.getElementById("sabor").value;
        const notaVal = document.getElementById("nota").value;
        const mensagem = document.getElementById("mensagem").value;

        // Cria visualmente a nota em estrelas
        const estrela = String.fromCodePoint(11088);
        const notaEstrelas = estrela.repeat(parseInt(notaVal));

        // 1. ADICIONA O COMENTÁRIO NA TELA
        const lista = document.getElementById("listaComentarios");
        const novoComentario = document.createElement("div");
        novoComentario.className =
          "bg-white dark:bg-neutral-800 p-6 rounded-3xl shadow-sm border border-delicate-pink/10 space-y-3";
        novoComentario.innerHTML = `
          <div class="flex items-center justify-between">
            <h3 class="font-bold text-dark-text dark:text-white">${nome}</h3>
            <span class="text-yellow-400 text-sm">${notaEstrelas}</span>
          </div>
          <p class="text-xs text-tiffany-blue dark:text-dark-tiffany-blue font-semibold">Sabor: ${sabor}</p>
          <p class="text-sm text-dark-text/80 dark:text-dark-text-light/80 italic">"${mensagem}"</p>
        `;
        lista.appendChild(novoComentario);

        // 2. ENVIA PARA O WHATSAPP
        const textoWhatsApp = `Olá Dai! Deixei um Feedback pelo site:\n\n*Nome:* ${nome}\n*Produto:* ${sabor}\n*Nota:* ${notaEstrelas}\n*Depoimento:* ${mensagem}`;
        window.open(
          `https://api.whatsapp.com/send?phone=5567992086035&text=${encodeURIComponent(textoWhatsApp)}`,
          "_blank",
        );

        // Limpa o formulário
        document.getElementById("feedbackForm").reset();
      }
    </script>
  </body>
</html>
